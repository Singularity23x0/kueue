on:
  issue_comment:
    types: [created]

jobs:
  authorize:
    name: Authorize and Parse Command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null &&
      (startsWith(github.event.comment.body, '/sync-release-notes') ||
       (startsWith(github.event.comment.body, '/release') && !startsWith(github.event.comment.body, '/release-')))
    outputs:
      command: ${{ steps.parse.outputs.command }}
      version: ${{ steps.parse.outputs.version }}
      branch: ${{ steps.parse.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify Actor Authorization
        env:
          ACTOR: ${{ github.actor }}
        run: |
          TEAM_FILE="release-team.json"
          if [ ! -f "$TEAM_FILE" ]; then
            echo "Error: Allowed actors list file $TEAM_FILE not found."
            exit 1
          fi
          if ! jq -e --arg actor "$ACTOR" '. | index($actor)' "$TEAM_FILE" > /dev/null; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Parse Command and Version
        id: parse
        env:
          BODY: ${{ github.event.comment.body }}
          TITLE: ${{ github.event.issue.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! "$TITLE" =~ ^Release\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Error: Issue title '$TITLE' does not match 'Release vX.Y.Z'"
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+ ]]; then
            echo "branch=release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          fi

          COMMAND=""
          if [[ "$BODY" =~ ^/sync-release-notes[[:space:]]*$ ]]; then
            COMMAND="sync-notes"
          elif [[ "$BODY" =~ ^/release[[:space:]]*$ ]]; then
            COMMAND="release"
          else
            echo "Error: Unsupported or invalid command format."
            exit 1
          fi

          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"

  sync-notes:
    name: Sync Release Notes
    runs-on: ubuntu-latest
    needs: authorize
    if: ${{ needs.authorize.outputs.command == 'sync-notes' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Install release-notes tool
        run: |
          go install k8s.io/release/cmd/release-notes@v0.20.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Sync Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REMOTE: origin
          VERSION: ${{ needs.authorize.outputs.version }}
        run: |
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          
          yes y | ./hack/releasing/sync-notes.sh "$VERSION"

  release:
    name: Tag and Draft Release
    runs-on: ubuntu-latest
    needs: authorize
    if: ${{ needs.authorize.outputs.command == 'release' }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Checkout release branch
        run: |
          git checkout "${{ needs.authorize.outputs.branch }}"

      - name: Configure Git User
        run: |
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@cb9bde2e2525e640591a934b1fd28eef1dcaf5e5 # v6.2.0
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Run Release Automation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.authorize.outputs.version }}
          BRANCH: ${{ needs.authorize.outputs.branch }}
        run: |
          # A. Generate Release Notes to a file to prevent shell escaping errors
          gh release notes --generate-notes --tag "$VERSION" --target "$BRANCH" > notes.txt
          
          # B. Create and Sign the Tag
          git tag -s "$VERSION" -F notes.txt
          git push origin "$VERSION"
          
          # C. Compile Artifacts and Create draft release
          make release-artifacts IMAGE_REGISTRY=registry.k8s.io/kueue GIT_TAG="$VERSION"
          gh release create "$VERSION" --draft \
            --title "$VERSION" \
            --notes-file notes.txt \
            release-artifacts/*

          # D. Tag next development version & create milestones
          if [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
            MAJ="${BASH_REMATCH[1]}"
            MIN="${BASH_REMATCH[2]}"
            NEXT_MIN=$((MIN + 1))
            DEVEL="v${MAJ}.${NEXT_MIN}.0-devel"
            
            echo "Preparing repository for the next development cycle: $DEVEL"
            git checkout main
            git tag "$DEVEL" main
            git push origin "$DEVEL"
            
            # Create next minor milestone
            gh milestone create --title "v${MAJ}.${NEXT_MIN}.0"
          fi
